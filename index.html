<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>

    <!-- Tailwind Cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link css -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="manrope-font ">
    <main class="md:max-w-[1200px] mx-auto  ">

        <!-- banner section -->

        <section class="flex flex-col md:flex-row gap-3 mt-12 mb-32 justify-between items-center px-4 lg:p-2">

            <!-- banner contant -->

            <div class=" w-fit ">
                <h2
                    class="text-2xl md:text-5xl md:leading-tight lg:text-7xl lg:leading-snug font-extrabold text-black ">
                    It's good <br> tea time at The Tea House
                </h2>
                <p class="text-sm text-gray-400 md:mt-4 md:mb-4 lg:mt-6 lg:mb-6 max-w-96">
                    Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.
                </p>
                <button
                    class="text-xl font-bold text-white px-5 py-4 rounded-lg bg-gradient-to-r from-[#FF8938] to-[#FF0000] cursor-pointer">
                    Explore More
                    <span>
                        <i class="fa-solid fa-arrow-right -rotate-45"></i>
                    </span>

                </button>
            </div>

            <!-- banner img -->

            <div class="relative sm:w-[60%]  lg:w-fit ">
                <img class="w-full relative top-16" src="./images/banner.png" alt="">

                <!-- banner rating part -->

                <div
                    class="hidden  lg:flex gap-2 justify-center items-center shadow-sm bg-white max-w-64 h-28 px-5  rounded-xl absolute lg:-bottom-14 left-10">

                    <span class="text-3xl">
                        <i class="fa-solid fa-star " style="color: rgb(255, 212, 59);"></i>
                    </span>

                    <div class="">
                        <h2 class="text-3xl font-extrabold text-black">
                            5.00
                        </h2>
                        <p class="text-lg font-bold text-gray-500">
                            Trust Pilot Ratings
                        </p>
                    </div>
                </div>
            </div>
        </section>


    </main>
    <footer>

    </footer>

</body>

</html>
